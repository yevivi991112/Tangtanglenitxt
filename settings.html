<div id="mv-settings-panel" class="mv-settings-wrap">
  <h4 style="color:#5D4E37;margin:0 0 10px;">🍬 糖的记忆管理 设置</h4>

  <!-- 总开关 -->
  <div class="mv-set-row">
    <label class="mv-set-label">
      <input type="checkbox" id="mv-set-enabled"> 插件总开关
    </label>
  </div>

  <!-- 存储方案 -->
  <div class="mv-set-group">
    <div class="mv-set-group-title">存储方案</div>
    <div class="mv-set-row">
      <select id="mv-set-backend" class="mv-select">
        <option value="ext">后端保存（推荐，跟随ST数据）</option>
        <option value="local">浏览器保存（备选，清缓存丢失）</option>
      </select>
    </div>
    <div class="mv-set-row" style="gap:6px;flex-wrap:wrap;">
      <button class="mv-tbtn" id="mv-test-ext">测试①</button>
      <span id="mv-test-ext-result" style="font-size:11px;color:#8B7355;"></span>
      <button class="mv-tbtn" id="mv-test-local">测试②</button>
      <span id="mv-test-local-result" style="font-size:11px;color:#8B7355;"></span>
    </div>
  </div>

  <!-- 注入设置 -->
  <div class="mv-set-group">
    <div class="mv-set-group-title">注入设置</div>
    <div class="mv-set-row">
      <label class="mv-set-label">注入位置:</label>
      <select id="mv-set-position" class="mv-select">
        <option value="in_chat">注入历史聊天（聊天记录最前方）</option>
        <option value="before_prompt">before_prompt（提示词前）</option>
        <option value="after_char">after_char（角色卡后）</option>
        <option value="authors_note">authors_note（作者注释）</option>
      </select>
    </div>
    <div class="mv-set-row">
      <label class="mv-set-label">
        <input type="checkbox" id="mv-set-pinned-first"> 置顶区块在前（否则最近N条在前）
      </label>
    </div>
    <div class="mv-set-row">
      <label class="mv-set-label">最近N条发送:</label>
      <input type="number" id="mv-set-recent-n" class="mv-num-input" min="0" max="999" value="5">
      <span style="font-size:11px;color:#8B7355;">(0=全发)</span>
    </div>
  </div>

  <!-- 记忆默认值 -->
  <div class="mv-set-group">
    <div class="mv-set-group-title">记忆默认值</div>
    <div class="mv-set-row">
      <label class="mv-set-label">默认重要度 (0~1):</label>
      <input type="number" id="mv-set-def-imp" class="mv-num-input" min="0" max="1" step="0.1" value="0.5">
    </div>
  </div>

  <!-- 预设标签 -->
  <div class="mv-set-group">
    <div class="mv-set-group-title">预设标签</div>
    <div id="mv-preset-tags-box" class="mv-preset-tags-box"></div>
    <div class="mv-set-row" style="margin-top:6px;">
      <input type="text" id="mv-preset-tag-input" class="mv-input" placeholder="新标签名…" style="flex:1;">
      <button class="mv-tbtn" id="mv-preset-tag-add">添加</button>
    </div>
  </div>

  <!-- 导出 / 导入 -->
  <div class="mv-set-group">
    <div class="mv-set-group-title">导出 / 导入</div>
    <div class="mv-set-row" style="gap:6px;flex-wrap:wrap;">
      <button class="mv-tbtn" id="mv-export-all">全量导出</button>
      <button class="mv-tbtn" id="mv-export-chat">当前聊天导出</button>
      <button class="mv-tbtn" id="mv-import-btn">导入 JSON</button>
      <input type="file" id="mv-import-file" accept=".json" style="display:none;">
    </div>
  </div>

  <!-- 操作工具 -->
  <div class="mv-set-group">
    <div class="mv-set-group-title">操作工具</div>
    <div class="mv-set-row" style="flex-direction:column;gap:6px;">
      <button class="mv-tbtn" id="mv-scan-chat-btn" style="width:100%;">🔍 手动扫描聊天中的 &lt;Lenitxt&gt; 块</button>
      <button class="mv-tbtn" id="mv-restore-all-btn" style="width:100%;">↩ 一键还原所有记忆到来源楼层</button>
      <button class="mv-tbtn mv-danger-btn" id="mv-restore-chat-snap-btn" style="width:100%;">⚠️ 恢复聊天快照</button>
      <button class="mv-tbtn mv-danger-btn" id="mv-restore-db-snap-btn" style="width:100%;">⚠️ 恢复记忆库快照</button>
    </div>
  </div>

  <!-- 自动捕获 -->
  <div class="mv-set-group">
    <div class="mv-set-group-title">自动捕获</div>
    <div class="mv-set-row">
      <label class="mv-set-label">
        <input type="checkbox" id="mv-set-auto-capture"> 启用自动捕获记忆
      </label>
    </div>
    <div style="font-size:11px;color:#B71C1C;margin-bottom:6px;">
      ⚠️ 开启后，超出 N 楼的消息中 &lt;Lenitxt&gt; 块将被自动入库并从聊天记录中删除
    </div>
    <div class="mv-set-row">
      <label class="mv-set-label">最近N楼不捕获:</label>
      <input type="number" id="mv-set-auto-capture-n" class="mv-num-input" min="0" max="999" value="6">
    </div>
  </div>

  <!-- 储存应用 -->
  <div class="mv-set-group" style="text-align:center;">
    <button class="mv-tbtn" id="mv-drawer-save-btn" style="width:100%;background:#C8A250;color:white;border-color:#B8956A;">💾 储存应用</button>
  </div>
</div>
